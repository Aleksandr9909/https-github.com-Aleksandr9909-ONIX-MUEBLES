<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #1A1917; /* Dark theme */
    color: white;
  }
  .logo-wrapper {
    width: 200px;
    height: 50px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid red; /* To see the bounds */
  }
  .logo-wrapper img {
    /* crop out the top and bottom white space */
    width: 200px;
    height: auto;
    object-fit: contain;
    /* make it look like a watermark */
    filter: grayscale(100%) invert(100%) brightness(150%) opacity(0.6);
    mix-blend-mode: screen;
  }
</style>
</head>
<body>
  <div class="logo-wrapper">
    <img src="images/onyx-logo-new.jpg" />
  </div>
</body>
</html>
